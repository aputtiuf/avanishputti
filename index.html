<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#061826" />
  <title>Avanish Putti | Contact Card</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="beach-bg" aria-hidden="true"></div>

  <main class="scene">
    <section class="glass-card" aria-label="Avanish Putti digital contact card">
      <div class="orb orb-one"></div>
      <div class="orb orb-two"></div>

      <header class="hero">
        <div class="photo-wrap">
          <img src="avanish.jpg" alt="Avanish Putti" class="profile-photo" />
        </div>

        <div class="identity">
          <div class="university-mark">
            <img src="uf-logo.png" alt="Florida Gators logo" />
            <span>University of Florida</span>
          </div>

          <h1>Avanish Putti</h1>
          <p class="subtitle">Innovation & Entrepreneurship</p>
        </div>
      </header>

      <section class="contact-panel">
        <a class="contact-line" href="tel:+17329661263" aria-label="Call Avanish Putti">
          <span class="icon">☎</span>
          <div>
            <small>Phone</small>
            <strong>+1 (732) 966-1263</strong>
          </div>
        </a>

        <a class="contact-line" href="mailto:a.putti@ufl.edu" aria-label="Email Avanish Putti">
          <span class="icon">✉</span>
          <div>
            <small>Email</small>
            <strong>a.putti@ufl.edu</strong>
          </div>
        </a>

        <a class="contact-line" href="https://www.linkedin.com/in/avanish-putti/" target="_blank" rel="noopener noreferrer" aria-label="Open Avanish Putti LinkedIn">
          <span class="icon linkedin">in</span>
          <div>
            <small>LinkedIn</small>
            <strong>avanish-putti</strong>
          </div>
        </a>
      </section>

      <button class="save-button" id="addContactButton" type="button">
        <span>Add This Contact</span>
      </button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
